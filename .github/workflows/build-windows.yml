name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.5'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --windowed `
            --name ComicTranslate `
            --icon resources/icons/icon.ico `
            --add-data "resources;resources" `
            comic.py

      - name: Smoke test bundle
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/ComicTranslate/ComicTranslate.exe" -PassThru
          Start-Sleep -Seconds 20
          if ($p.HasExited) {
            Write-Error "App exited early with code $($p.ExitCode)"
            exit 1
          }
          Stop-Process -Id $p.Id -Force
          Write-Output "Smoke test passed"

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path dist/ComicTranslate -DestinationPath dist/ComicTranslate-Windows-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: Comic-Translate-Windows
          path: dist/ComicTranslate-Windows-x86_64.zip
          if-no-files-found: error
          retention-days: 30
